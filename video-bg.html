<!DOCTYPE html>
<html><head><meta charset="utf-8"><title></title>
<style>
  html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#111;}
  video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;}
</style>
</head><body>
<video autoplay loop muted playsinline preload="auto" poster="/img/bg-video-poster.jpg">
  <source src="/video/bg.mp4" type="video/mp4">
</video>
<script>
var v=document.querySelector('video');
v.play().catch(function(){});
v.addEventListener('loadedmetadata',function(){v.play().catch(function(){});});
</script>
</body></html>
